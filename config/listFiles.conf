server {
    listen 80;
    server_name scripts.vnerd.nl;

    location / {
        root /usr/share/nginx/html;
        autoindex on;                  # 👈 Enables directory listing
        autoindex_exact_size off;     # (optional) Shows human-readable sizes
        autoindex_localtime on;       # (optional) Shows local time instead of GMT
    }
}