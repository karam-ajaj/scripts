name: Scripts - Validate + Deploy Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Nginx Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run nginx config test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/config/listFiles.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:latest nginx -t

  build:
    name: Build static site
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build public folder
        run: |
          rm -rf public
          mkdir -p public

          # Copy scripts if exists
          if [ -d "data/scripts" ]; then
            cp -r data/scripts public/
          fi

          # Copy nginx config for reference
          mkdir -p public/config
          cp config/listFiles.conf public/config/

          # Generate index (Nginx-like)
          echo "<html><head><title>Scripts</title></head><body>" > public/index.html
          echo "<h1>Index of /</h1><pre>" >> public/index.html

          find public -type f | sed 's|public/||' | sort | while read file; do
            echo "<a href=\"$file\">$file</a>" >> public/index.html
          done

          echo "</pre></body></html>" >> public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
