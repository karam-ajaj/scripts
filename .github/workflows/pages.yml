name: Scripts - Mirror Nginx Structure

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build static site (mirror data root)
        run: |
          rm -rf public
          mkdir -p public

          # IMPORTANT: mirror data exactly to root
          cp -r data/. public/

          # Create simple index page (fixes 404)
          cat <<EOF > public/index.html
          <html>
          <head>
            <title>Scripts File Server</title>
          </head>
          <body>
            <h1>Scripts Index</h1>
            <p>Direct file access (Nginx-like structure)</p>
            <ul>
          EOF

          find public -type f ! -name index.html | sed 's|public/||' | sort | while read file; do
            echo "<li><a href=\"$file\">$file</a></li>" >> public/index.html
          done

          echo "</ul></body></html>" >> public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
