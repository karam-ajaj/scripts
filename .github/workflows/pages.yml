name: Validate + Deploy Scripts Repo

on:
  push:
    branches:
      - main

  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Nginx Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate nginx config
        run: |
          echo "Validating Nginx config..."

          docker run --rm \
            -v ${{ github.workspace }}/config/listFiles.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:latest nginx -t

  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p public

          # Copy scripts (if they exist)
          if [ -d "data/scripts" ]; then
            cp -r data/scripts public/
          fi

          # Include nginx config for reference/documentation
          mkdir -p public/config
          cp config/listFiles.conf public/config/

          # Generate simple index page
          cat <<EOF > public/index.html
          <html>
          <head>
            <title>Scripts Repo</title>
          </head>
          <body>
            <h1>Scripts Repository</h1>

            <h2>Files</h2>
            <pre>
          $(ls -R public)
            </pre>

            <h2>Nginx Config</h2>
            <pre>
          $(cat config/listFiles.conf)
            </pre>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
