- name: Build nice file server UI
  run: |
    rm -rf public
    mkdir -p public

    # mirror data exactly
    cp -r data/. public/

    # generate styled index
    cat <<'EOF' > public/index.html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scripts File Server</title>

  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      margin: 0;
      padding: 30px;
    }

    h1 {
      color: #58a6ff;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .file {
      padding: 6px 10px;
      margin: 2px 0;
      border-radius: 6px;
    }

    .file:hover {
      background: #161b22;
    }

    a {
      color: #8b949e;
      text-decoration: none;
      display: block;
    }

    a:hover {
      color: #58a6ff;
    }

    .path {
      color: #6e7681;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .folder {
      margin-top: 15px;
      color: #58a6ff;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📁 Scripts File Server</h1>
    <div class="path">Root: /data</div>

    <div id="tree">
EOF

    # build grouped listing (folders first)
    find public -type f ! -name index.html | sort | while read f; do
      clean=${f#public/}
      folder=$(dirname "$clean")

      echo "<div class='file'><a href='/$clean'>📄 $clean</a></div>" >> public/index.html
    done

    cat <<EOF >> public/index.html
    </div>
  </div>
</body>
</html>
EOF
