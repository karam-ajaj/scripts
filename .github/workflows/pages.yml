name: Deploy Scripts (Fixed Root Mapping)

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug structure (IMPORTANT)
        run: |
          echo "=== REPO STRUCTURE ==="
          find .

      - name: Build correct public site (NO EXTRA FOLDERS)
        run: |
          rm -rf public
          mkdir -p public

          # CRITICAL FIX:
          # Copy CONTENT of data/ directly into public root
          cp -r data/. public/

          echo "=== PUBLIC STRUCTURE ==="
          find public

      - name: Create minimal index (prevents 404 root issue)
        run: |
          cat <<EOF > public/index.html
          <html>
          <head>
            <title>Scripts</title>
          </head>
          <body>
            <h1>Scripts Index</h1>
            <ul>
          EOF

          find public -type f ! -name index.html | sed 's|public/||' | while read f; do
            echo "<li><a href=\"/$f\">$f</a></li>" >> public/index.html
          done

          echo "</ul></body></html>" >> public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
