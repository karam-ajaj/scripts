name: Scripts Repo - Validate + Nginx UI + Deploy Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate nginx config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/config/listFiles.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:latest nginx -t

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Build static site
        run: |
          rm -rf public
          mkdir -p public

          # FIXED: correct flattening
          cp -r data/. public/

          mkdir -p public/config
          cp config/listFiles.conf public/config/

          # generate file list safely
          tree data > /tmp/tree.txt || echo "tree not available" > /tmp/tree.txt

          find data -type f | sort | sed 's|data/||' | while read f; do
            echo "<a class='file' href='/$f'>📄 $f</a>" >> /tmp/files.txt
          done

          CONFIG_CONTENT=$(cat config/listFiles.conf 2>/dev/null || echo "no config")

          cat <<EOF > public/index.html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scripts File Server</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0d1117;
  color: #c9d1d9;
}

.header {
  padding: 14px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}

.container {
  display: flex;
  height: calc(100vh - 50px);
}

.sidebar {
  width: 340px;
  border-right: 1px solid #30363d;
  padding: 10px;
  overflow: auto;
}

.main {
  flex: 1;
  padding: 20px;
  overflow: auto;
}

pre {
  background: #161b22;
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
}

a.file {
  display: block;
  padding: 5px;
  color: #c9d1d9;
  text-decoration: none;
}

a.file:hover {
  background: #21262d;
  color: #58a6ff;
}

.title {
  color: #58a6ff;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="header">📁 Scripts File Server (Nginx Clone)</div>

<div class="container">

<div class="sidebar">
<div class="title">📂 Tree</div>
<pre>
EOF

          cat /tmp/tree.txt >> public/index.html

          cat <<EOF >> public/index.html
</pre>
</div>

<div class="main">

<div class="title">📄 Files</div>
<pre>
EOF

          cat /tmp/files.txt >> public/index.html

          cat <<EOF >> public/index.html
</pre>

<div class="title">⚙️ Nginx Config</div>
<pre>
EOF

          echo "$CONFIG_CONTENT" >> public/index.html

          cat <<EOF >> public/index.html
</pre>

</div>
</div>

</body>
</html>
EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
