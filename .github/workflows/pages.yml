- name: Build Nginx-style File Explorer
  run: |
    rm -rf public
    mkdir -p public

    # FIXED COPY (important)
    cp -r data/. public/

    # Install tree for structure parsing
    sudo apt-get update && sudo apt-get install -y tree

    # Build file list JSON (for UI)
    mkdir -p public/_meta
    find public -type f ! -name index.html | sed 's|public/||' > public/_meta/files.txt

    # Generate Explorer UI
    cat <<'EOF' > public/index.html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scripts Explorer</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0d1117;
  color: #c9d1d9;
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 300px;
  background: #161b22;
  padding: 10px;
  overflow-y: auto;
  border-right: 1px solid #30363d;
}

#content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

a {
  color: #58a6ff;
  text-decoration: none;
  display: block;
  padding: 3px 0;
}

a:hover {
  text-decoration: underline;
}

.folder {
  font-weight: bold;
  color: #f0f6fc;
  margin-top: 10px;
}

.file {
  margin-left: 10px;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>📁 Scripts</h3>
<div id="tree"></div>
</div>

<div id="content">
<h2>Welcome</h2>
<p>Select a file from the left panel.</p>
</div>

<script>
// Simple static tree builder from URL structure
const files = [
EOF

    # inject file list into JS array
    find public -type f ! -name index.html | sed 's|public/||' | while read f; do
      echo "\"/$f\"," >> public/index.html
    done

    cat <<'EOF' >> public/index.html
];

function renderTree(files) {
  const tree = {};
  
  files.forEach(path => {
    const parts = path.split('/').filter(Boolean);
    let current = tree;

    parts.forEach((part, i) => {
      if (!current[part]) {
        current[part] = (i === parts.length - 1) ? null : {};
      }
      current = current[part];
    });
  });

  function render(node, prefix = '') {
    let html = '';

    for (const key in node) {
      if (node[key] === null) {
        html += `<div class="file"><a href="${prefix}/${key}">📄 ${key}</a></div>`;
      } else {
        html += `<div class="folder">📁 ${key}</div>`;
        html += `<div style="margin-left:10px">`;
        html += render(node[key], prefix + '/' + key);
        html += `</div>`;
      }
    }

    return html;
  }

  return render(tree, '');
}

document.getElementById('tree').innerHTML = renderTree(files);
</script>

</body>
</html>
EOF
