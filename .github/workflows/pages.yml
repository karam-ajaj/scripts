name: Scripts Repo - Validate + Tree + Deploy Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Nginx Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate nginx config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/config/listFiles.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:latest nginx -t

  build:
    name: Build file tree site
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tree tool
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Build static site
        run: |
          rm -rf public
          mkdir -p public

          # Copy data preserving structure
          if [ -d "data" ]; then
            cp -r data public/data
          fi

          # Copy nginx config for reference
          mkdir -p public/config
          cp config/listFiles.conf public/config/

          # Generate index.html
          cat <<EOF > public/index.html
          <html>
          <head>
            <title>Scripts File Server</title>
            <style>
              body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
              a { color: #6cf; text-decoration: none; }
              a:hover { text-decoration: underline; }
              pre { background: #222; padding: 10px; border-radius: 6px; }
            </style>
          </head>
          <body>

          <h1>📁 Data Folder Tree</h1>
          <pre>
          $(tree data)
          </pre>

          <h2>📂 Files</h2>
          <pre>
          $(find data -type f | sort | sed 's|data/||' | while read f; do
            echo "<a href=\"data/$f\">$f</a>"
          done)
          </pre>

          <h2>⚙️ Nginx Config</h2>
          <pre>
          $(cat config/listFiles.conf)
          </pre>

          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
