- name: Build Nginx-like directory view
  run: |
    mkdir -p public

    # copy scripts
    if [ -d "data/scripts" ]; then
      cp -r data/scripts public/
    fi

    # copy nginx config for reference
    mkdir -p public/config
    cp config/listFiles.conf public/config/

    # generate index.html (nginx-style listing)
    echo "<html><head><title>Scripts Index</title></head><body>" > public/index.html
    echo "<h1>Index of /scripts</h1>" >> public/index.html
    echo "<pre>" >> public/index.html

    # simulate nginx autoindex
    find public -type f | sed "s|public/||" | sort | while read f; do
      echo "<a href=\"$f\">$f</a>" >> public/index.html
    done

    echo "</pre>" >> public/index.html
    echo "</body></html>" >> public/index.html
