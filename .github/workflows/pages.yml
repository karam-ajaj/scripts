name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:   

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p public

          # copy scripts into site
          cp -r data/scripts/* public/

          # create index if missing
          if [ ! -f public/index.html ]; then
            echo "<h1>Scripts</h1>" > public/index.html
            echo "<pre>" >> public/index.html
            ls -R public >> public/index.html
            echo "</pre>" >> public/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
