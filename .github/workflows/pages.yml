          cat <<'EOF' > public/index.html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scripts File Server</title>

  <style>
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #0d1117;
      color: #c9d1d9;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      font-size: 14px;
    }

    .container {
      display: flex;
      height: calc(100vh - 50px);
    }

    /* Sidebar (tree) */
    .sidebar {
      width: 320px;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      padding: 10px;
    }

    .tree ul {
      list-style: none;
      padding-left: 16px;
    }

    .tree li {
      margin: 4px 0;
    }

    .tree a {
      color: #8b949e;
      text-decoration: none;
    }

    .tree a:hover {
      color: #58a6ff;
    }

    /* Main panel */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .file-link {
      display: block;
      padding: 6px 10px;
      border-radius: 6px;
      color: #c9d1d9;
      text-decoration: none;
    }

    .file-link:hover {
      background: #161b22;
      color: #58a6ff;
    }

    pre {
      background: #161b22;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #30363d;
    }

    .title {
      color: #58a6ff;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="header">
  📁 Scripts File Server (Nginx Clone UI)
</div>

<div class="container">

  <!-- SIDEBAR TREE -->
  <div class="sidebar">
    <div class="title">📂 Tree</div>
    <pre>
$(tree data 2>/dev/null || echo "tree not available")
    </pre>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="title">📄 Files</div>

    <pre>
$(find data -type f 2>/dev/null | sort | while read f; do
  clean=${f#data/}
  echo "<a class='file-link' href='/$clean'>📄 $clean</a>"
done)
    </pre>

    <div class="title">⚙️ Nginx Config</div>

    <pre>
$(cat config/listFiles.conf 2>/dev/null)
    </pre>

  </div>

</div>

</body>
</html>
EOF
